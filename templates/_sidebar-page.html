{% extends "_base.html" %}

{% block main %}
        <section class="page-intro">
            {% block page_intro %}{% endblock %}
        </section>

        <!-- Mobile sidebar overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <div class="page-layout">
            <aside class="sidebar surface-card" id="sidebar">
                <button class="sidebar-close" id="sidebar-close" aria-label="Close table of contents">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
                <h2>On this page</h2>
                <ul>
                    {% block sidebar_nav %}{% endblock %}
                </ul>
            </aside>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </div>

        <!-- Mobile Table of Contents button -->
        <button class="mobile-toc-toggle" id="mobile-toc-toggle" aria-label="Toggle table of contents">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
{% endblock %}
